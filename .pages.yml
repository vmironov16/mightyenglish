media:
  input: public/assets/img
  output: /assets/img

content:
  - name: about
    label: О себе и курсе
    type: collection
    path: src/content/about
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: order
        label: Порядок отображения
        type: number
      - name: body
        label: Содержимое
        type: rich-text

  - name: skills
    label: Структура курса
    type: collection
    path: src/content/skills
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: order
        label: Порядок отображения
        type: number
      - name: icon
        label: Иконка
        type: select
        options:
          values:
            - { label: "Книга", value: "fa-book" }
            - { label: "Мозг / Знания", value: "fa-brain" }
            - { label: "Игра / Практика", value: "fa-gamepad" }
            - { label: "Список тем", value: "fa-list-check" }
            - { label: "Планирование", value: "fa-calendar-alt" }
            - { label: "Разговор", value: "fa-comments" }
            - { label: "Звезда", value: "fa-star" }
            - { label: "Цель", value: "fa-bullseye" }
            - { label: "Карандаш", value: "fa-pencil-alt" }
            - { label: "Учёба", value: "fa-graduation-cap" }
      - name: body
        label: Содержимое
        type: rich-text

  - name: settings
    label: Настройки сайта
    type: file
    path: _data/settings.yml
    fields:
      - name: site_title
        label: Название сайта
        type: string
      - name: header_subtitle
        label: Подзаголовок на главной
        type: string
      - name: description
        label: Описание (для SEO)
        type: string
      - name: footer_text
        label: Текст в подвале
        type: string
      - name: email
        label: Email
        type: string
      - name: phone
        label: Телефон
        type: string
      - name: vk
        label: Ссылка VK
        type: string
      - name: whatsapp
        label: Ссылка WhatsApp
        type: string
      - name: telegram
        label: Ссылка Telegram
        type: string
      - name: formspree_url
        label: Formspree URL (для формы обратной связи)
        type: string
