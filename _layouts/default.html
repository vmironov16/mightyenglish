<!DOCTYPE html>
<html lang="ru">
{% include head.html %}
<body>

  <header class="hero">
    <nav class="nav" id="nav">
      <a class="nav-logo" href="#">{{ site.title }}</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="#about">О курсе</a>
        <a href="#skills">Методология</a>
        <a href="#contact">Контакт</a>
      </div>
    </nav>

    <div class="hero-content">
      <div class="hero-avatar">
        <div class="hero-avatar-flip">
          <div class="hero-avatar-front">
            <img src="/assets/img/logomin.jpg" alt="Mighty English">
          </div>
          <div class="hero-avatar-back">
            <img src="/assets/img/me-none-bg.jpg" alt="Рудольф Ладнер">
          </div>
        </div>
      </div>
      <div class="hero-text">
        <h1>{{ site.title }}</h1>
        <p>{{ site.data.settings.header_subtitle }}</p>
        <a href="#about" class="btn btn-outline">Узнать больше</a>
        <a href="#contact" class="btn btn-primary">Записаться</a>
      </div>
    </div>

    <a class="hero-scroll" href="#about" aria-label="Прокрутить вниз">
      <i class="fas fa-chevron-down"></i>
    </a>
  </header>

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="/assets/js/main.js"></script>
</body>
</html>
